<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AspireMatch Loading</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #166D3B, #1f8f4e);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease-in-out;
      position: relative;
    }

    img {
      width: 90px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .version {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.85;
    }

    .loading {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
      animation: pulse 1.5s infinite;
    }

    .footer {
      position: absolute;
      bottom: 15px;
      font-size: 12px;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

  </style>
</head>

<body>
  <div class="card">
    <img src="Aspirematch-logo.png" alt="AspireMatch Logo">
    <h1>AspireMatch</h1>
    <div class="version" id="version">v1.0.0</div>
    <div class="loading">Initializing...</div>
    <div class="footer">Developed by HKML, ETG, ACJ</div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    ipcRenderer.on("app_version", (event, version) => {
      document.getElementById("version").innerText = "v" + version;
    });
  </script>
</body>
</html>
